<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VTE Combined Stats - Poster Chart</title>
<style>
  body { margin: 0; padding: 24px; font-family: 'Helvetica Neue', Arial, sans-serif; background: #fff; }
</style>
</head>
<body>
<div style="max-width: 720px; margin: 0 auto;">
  <div style="position: relative; width: 100%; height: 380px;">
    <canvas id="comboChart" role="img" aria-label="Horizontal bar chart showing VTE statistics: ML model accuracy 95%, tool non-adoption 90%, alert override rate 72%, black-box override 67%, Khorana accuracy 60%, poor numeracy 50%, workflow error increase 12%">Combined VTE statistics across prediction accuracy and communication failure.</canvas>
  </div>
  <div style="display: flex; flex-wrap: wrap; gap: 16px; margin-top: 8px; font-size: 12px; color: #5f5e5a;">
    <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #228833;"></span>Prediction (what works)</span>
    <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #EE6677;"></span>Communication (what fails)</span>
    <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #CCBB44;"></span>Current standard</span>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const textColor = '#2c2c2a';
const gridColor = 'rgba(0,0,0,0.06)';

const tolGreen = '#228833';
const tolRed = '#EE6677';
const tolYellow = '#CCBB44';

const labels = [
  'ML model accuracy (AUROC)',
  'Clinical tool non-adoption',
  'Alert override rate',
  'Black-box algorithm overrides',
  'Khorana score accuracy (C-stat)',
  'Adults failing basic probability',
  'Workflow error increase from alerts',
];

const values = [95, 90, 72, 67, 60, 50, 12];
const colors = [tolGreen, tolRed, tolRed, tolRed, tolYellow, tolRed, tolRed];

new Chart(document.getElementById('comboChart'), {
  type: 'bar',
  data: {
    labels: labels,
    datasets: [{
      data: values,
      backgroundColor: colors.map(c => c + 'CC'),
      borderColor: colors,
      borderWidth: 1.5,
      borderRadius: 3,
      barPercentage: 0.65,
    }]
  },
  options: {
    indexAxis: 'y',
    responsive: true,
    maintainAspectRatio: false,
    layout: { padding: { right: 36 } },
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: { label: (ctx) => ctx.parsed.x + '%' }
      }
    },
    scales: {
      x: {
        min: 0, max: 100,
        ticks: {
          color: textColor,
          callback: v => v + '%',
          font: { size: 11 },
          stepSize: 25
        },
        grid: { color: gridColor }
      },
      y: {
        ticks: {
          color: textColor,
          font: { size: 12 },
          crossAlign: 'far',
        },
        grid: { display: false },
        afterFit: function(axis) { axis.width = 240; }
      }
    },
    animation: {
      onComplete: function() {
        const ctx = this.ctx;
        const meta = this.getDatasetMeta(0);
        ctx.save();
        ctx.font = '500 12px Helvetica Neue, Arial, sans-serif';
        ctx.fillStyle = textColor;
        ctx.textBaseline = 'middle';
        meta.data.forEach((bar, i) => {
          ctx.fillText(values[i] + '%', bar.x + 8, bar.y);
        });
        ctx.restore();
      }
    }
  }
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VTE PRISMA Review Funnel</title>
<style>body { margin: 0; padding: 24px; font-family: 'Helvetica Neue', Arial, sans-serif; background: #fff; }</style>
</head>
<body>
<div style="max-width: 360px; margin: 0 auto;">
  <svg width="100%" viewBox="0 0 340 620" role="img">
    <title>PRISMA systematic review funnel showing filtering from 847 records to 50 included studies</title>
    <desc>Vertical funnel diagram showing five stages of literature filtering</desc>

    <rect x="20" y="20" width="300" height="80" rx="6" fill="#4477AA"/>
    <text x="170" y="48" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Records identified</text>
    <text x="170" y="68" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">847</text>
    <text x="170" y="88" text-anchor="middle" fill="#fff" font-size="10" opacity="0.8">PubMed, Scopus, Web of Science, IEEE</text>

    <path d="M170 100 L170 130" stroke="#BBBBBB" stroke-width="1.5" fill="none" stroke-dasharray="4 3"/>
    <rect x="220" y="108" width="110" height="28" rx="4" fill="none" stroke="#EE6677" stroke-width="1"/>
    <text x="275" y="126" text-anchor="middle" fill="#EE6677" font-size="10" font-weight="500">389 duplicates removed</text>

    <rect x="40" y="130" width="260" height="80" rx="6" fill="#4477AA" opacity="0.88"/>
    <text x="170" y="158" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Records screened</text>
    <text x="170" y="178" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">458</text>
    <text x="170" y="198" text-anchor="middle" fill="#fff" font-size="10" opacity="0.8">Title and abstract review</text>

    <path d="M170 210 L170 240" stroke="#BBBBBB" stroke-width="1.5" fill="none" stroke-dasharray="4 3"/>
    <rect x="215" y="218" width="115" height="28" rx="4" fill="none" stroke="#EE6677" stroke-width="1"/>
    <text x="272" y="236" text-anchor="middle" fill="#EE6677" font-size="10" font-weight="500">312 excluded by scope</text>

    <rect x="60" y="240" width="220" height="80" rx="6" fill="#4477AA" opacity="0.76"/>
    <text x="170" y="268" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Full-text assessed</text>
    <text x="170" y="288" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">146</text>
    <text x="170" y="308" text-anchor="middle" fill="#fff" font-size="10" opacity="0.8">Eligibility criteria applied</text>

    <path d="M170 320 L170 350" stroke="#BBBBBB" stroke-width="1.5" fill="none" stroke-dasharray="4 3"/>
    <rect x="210" y="328" width="120" height="28" rx="4" fill="none" stroke="#EE6677" stroke-width="1"/>
    <text x="270" y="346" text-anchor="middle" fill="#EE6677" font-size="10" font-weight="500">96 did not meet criteria</text>

    <rect x="80" y="350" width="180" height="80" rx="6" fill="#66CCEE"/>
    <text x="170" y="378" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Studies analyzed</text>
    <text x="170" y="398" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">50</text>
    <text x="170" y="418" text-anchor="middle" fill="#fff" font-size="10" opacity="0.8">Risk prediction + visualization + CDS</text>

    <path d="M170 430 L170 460" stroke="#BBBBBB" stroke-width="1.5" fill="none" stroke-dasharray="4 3"/>

    <rect x="32" y="460" width="130" height="90" rx="6" fill="#228833"/>
    <text x="97" y="486" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Dynamic risk</text>
    <text x="97" y="500" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">prediction</text>
    <text x="97" y="524" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">23</text>
    <text x="97" y="540" text-anchor="middle" fill="#fff" font-size="9" opacity="0.8">ML models, AUROC</text>

    <rect x="178" y="460" width="130" height="90" rx="6" fill="#AA3377"/>
    <text x="243" y="486" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Visualization</text>
    <text x="243" y="500" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">+ CDS tools</text>
    <text x="243" y="524" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">27</text>
    <text x="243" y="540" text-anchor="middle" fill="#fff" font-size="9" opacity="0.8">UI, workflow, alerts</text>

    <text x="170" y="590" text-anchor="middle" fill="#BBBBBB" font-size="10" font-style="italic">Key finding: 95-98% AUROC but 49-96% alert override rates</text>

  </svg>
</div>
</body>
</html>
